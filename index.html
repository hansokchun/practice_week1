<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram | Premium Storytelling</title>
    
    <!-- External Resources -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main Interactive Map -->
        <div id="map-container">
            <div id="map"></div>
            <button id="sidebar-toggle" class="map-overlay-btn">◀</button>
        </div>

        <!-- Sidebar Content -->
        <aside id="sidebar">
            <!-- 1. FEED EXPLORE PANEL -->
            <section id="panel-explore" class="panel active">
                <header class="sidebar-header">
                    <h1 class="logo">Travelgram</h1>
                    <label for="upload-input" class="btn-post">Post a Story</label>
                    <input type="file" id="upload-input" multiple accept="image/jpeg, image/png" style="display:none;">
                </header>

                <nav class="feed-nav">
                    <button id="btn-my-feed" class="nav-link active">My Stories</button>
                    <button id="btn-shared-feed" class="nav-link">Community</button>
                </nav>

                <div class="filter-bar">
                    <div class="scroll-wrapper">
                        <button id="filter-liked" class="chip">Liked</button>
                        <button id="btn-path" class="chip">Path</button>
                        <div id="date-chips" class="chip-group">
                            <button class="chip active" data-date="all">All Dates</button>
                        </div>
                    </div>
                </div>

                <div class="view-switcher">
                    <button id="btn-view-map" class="switch-btn active">Map View</button>
                    <button id="btn-view-grid" class="switch-btn">Grid View</button>
                </div>

                <div id="grid-container" class="story-grid">
                    <!-- Dynamic Grid Items -->
                </div>

                <footer class="sidebar-footer">
                    <button id="btn-reset" class="danger-link">Reset Library</button>
                </footer>
            </section>

            <!-- 2. STORY DETAIL PANEL -->
            <section id="panel-detail" class="panel">
                <header class="detail-header">
                    <button id="btn-back" class="icon-btn">← Back</button>
                    <button id="btn-expand" class="icon-btn">Expand Map</button>
                </header>

                <article class="story-viewer">
                    <div class="image-stage">
                        <img id="detail-image" src="" alt="">
                        <div id="big-heart" class="floating-heart">❤️</div>
                    </div>

                    <div class="story-content">
                        <div class="meta">
                            <time id="detail-date" class="date-text"></time>
                            <div class="actions">
                                <button id="btn-like" class="like-btn">🤍</button>
                                <a id="btn-download" href="#" download class="save-btn">Save</a>
                            </div>
                        </div>
                        
                        <h2 id="detail-title" class="story-title"></h2>
                        <p class="stats"><span id="detail-likes">0</span> community appreciations</p>

                        <hr class="serif-hr">

                        <div class="reflections">
                            <h3>Reflections</h3>
                            <ul id="comment-list" class="comment-items"></ul>
                        </div>
                    </div>
                </article>

                <form id="comment-form" class="comment-box">
                    <input type="text" id="comment-input" placeholder="Add a reflection..." required autocomplete="off">
                    <button type="submit">Send</button>
                </form>
            </section>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="main.js"></script>
</body>
</html>
