<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram | Premium Storytelling</title>
    
    <!-- External Resources -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link rel="icon" href="images/logo.png?v=2" type="image/png">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- Splash Screen / Intro Page -->
    <div id="splash-screen">
        <div class="splash-bg-slider">
            <div class="slider-track">
                <!-- User added travel/photo themed images -->
                <div class="slide" style="background-image: url('images/main_bg1.jpg')"></div>
                <div class="slide" style="background-image: url('images/main_bg2.jpg')"></div>
                <div class="slide" style="background-image: url('images/main_bg3.jpg')"></div>
                <div class="slide" style="background-image: url('images/main_bg4.jpg')"></div>
                <div class="slide" style="background-image: url('images/main_bg5.jpg')"></div>
                
                <!-- Duplicate for seamless loop -->
                <div class="slide" style="background-image: url('images/main_bg1.jpg')"></div>
            </div>
        </div>
        <div class="splash-content">
            <h1 class="splash-logo">Travelgram</h1>
            <p class="splash-tagline">Archive your moments, Map your journey.</p>
            <button id="btn-start" class="splash-start-btn">Get Started</button>
        </div>
        <div class="splash-overlay"></div>
    </div>

    <div id="app">
        <!-- Sidebar Content -->
        <aside id="sidebar">
            <div id="drag-handle" class="drag-handle">
                <div class="handle-bar"></div>
            </div>
            <!-- 1. FEED EXPLORE PANEL -->
            <section id="panel-explore" class="panel active">
                <header class="sidebar-header">
                    <h1 class="logo">Travelgram</h1>
                    <div class="header-actions">
                        <label for="upload-input" class="btn-post">Post a Story</label>
                        <input type="file" id="upload-input" multiple accept="image/jpeg, image/png" style="display:none;">
                        <!-- 유저 프로필/로그아웃 영역 -->
                        <div id="user-menu" class="user-menu" style="position: relative;">
                            <div id="user-avatar" class="user-avatar" title="내 계정">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </div>
                            
                            <!-- 프로필 팝업 -->
                            <div id="profile-popup" class="profile-popup hidden">
                                <div class="profile-header">
                                    <div id="profile-popup-avatar" class="profile-avatar-large"></div>
                                    <div class="profile-info">
                                        <h3 id="profile-email">email@example.com</h3>
                                        <p id="profile-id" class="text-muted">ID: ...</p>
                                    </div>
                                </div>
                                <div class="profile-stats">
                                    <div class="stat-item">
                                        <span id="profile-story-count" class="stat-value">0</span>
                                        <span class="stat-label">Stories</span>
                                    </div>
                                    <div class="stat-item">
                                        <span id="profile-like-count" class="stat-value">0</span>
                                        <span class="stat-label">Liked</span>
                                    </div>
                                </div>
                                <div class="profile-demographics">
                                    <div class="demo-display" id="demo-display">
                                        <div class="demo-tags">
                                            <span id="demo-age" class="demo-tag hidden"></span>
                                            <span id="demo-gender" class="demo-tag hidden"></span>
                                        </div>
                                        <button id="btn-edit-demo" class="btn-text-small">나이/성별 설정</button>
                                    </div>
                                    <div class="demo-edit hidden" id="demo-edit">
                                        <div class="demo-inputs">
                                            <select id="input-age" class="demo-select">
                                                <option value="">연령대</option>
                                                <option value="10s">10대</option>
                                                <option value="20s">20대</option>
                                                <option value="30s">30대</option>
                                                <option value="40s">40대</option>
                                                <option value="50+">50대 이상</option>
                                            </select>
                                            <select id="input-gender" class="demo-select">
                                                <option value="">성별</option>
                                                <option value="M">남성</option>
                                                <option value="F">여성</option>
                                                <option value="U">비공개</option>
                                            </select>
                                        </div>
                                        <div class="demo-actions">
                                            <button id="btn-save-demo" class="btn-save-small">저장</button>
                                            <button id="btn-cancel-demo" class="btn-cancel-small">취소</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-actions">
                                    <button id="btn-logout" class="btn-logout-full" title="로그아웃">
                                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                        로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>

                <nav class="feed-nav">
                    <button id="btn-my-feed" class="nav-link active">My Stories</button>
                    <button id="btn-shared-feed" class="nav-link">Community</button>
                </nav>

                <div class="filter-bar">
                    <div class="scroll-wrapper">
                        <button id="filter-liked" class="chip">Liked</button>
                        <div id="date-chips" class="chip-group">
                            <button class="chip active" data-date="all">All Dates</button>
                        </div>
                    </div>
                </div>

                <div class="view-switcher-tools">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="search-input" placeholder="Search stories...">
                    </div>
                    <button id="btn-grid-density" class="icon-btn-tool" title="Toggle Grid Density">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </button>
                </div>

                <div id="grid-container" class="story-grid">
                    <!-- Dynamic Grid Items with Grouping -->
                </div>
            </section>

            <!-- 2. STORY DETAIL PANEL -->
            <section id="panel-detail" class="panel">
                <header class="detail-header">
                    <button id="btn-back" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        <span>Back</span>
                    </button>
                    <div class="detail-actions-right">
                        <button id="btn-save-edit" class="icon-btn save-edit-btn" title="Save Changes">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v13a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                            <span>Save</span>
                        </button>
                        <button id="btn-delete" class="icon-btn danger" title="Delete Photo">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                        <button id="btn-edit-location" class="icon-btn" title="Change Location">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        </button>
                        <button id="btn-street-view" class="icon-btn" title="Open Street View">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"></circle><path d="M9 22V12h6v10M12 8v4"></path></svg>
                        </button>
                        <button id="btn-copy-link" class="icon-btn" title="Copy Direct Link">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                        <button id="detail-share-btn" class="icon-btn share-toggle" title="Share to Community">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        </button>
                        <button id="detail-like-btn" class="icon-btn like-toggle" title="Like Photo">
                            <svg id="heart-svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        </button>
                    </div>
                </header>
                
                <div class="story-viewer">
                    <div class="image-stage">
                        <img id="detail-image" src="" alt="Detail View">
                    </div>
                    
                    <div class="story-content">
                        <div class="meta">
                            <span id="detail-date" class="date-text">March 14, 2024</span>
                            <span id="like-count-badge" class="like-badge">0 likes</span>
                        </div>
                        <input type="text" id="edit-title" class="title-input" placeholder="Untitled Story">
                        <textarea id="edit-desc" class="desc-input" placeholder="Add more details about this moment..."></textarea>
                        <hr class="serif-hr">
                        
                        <!-- NEW: Comments Section -->
                        <div class="comments-section">
                            <h3>Comments</h3>
                            <div id="comments-list" class="comments-list"></div>
                            <div class="comment-input-group">
                                <input type="text" id="comment-input" placeholder="Write a comment...">
                                <button id="btn-send-comment">Post</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </aside>
<!-- Main Interactive Map -->
<div id="map-container">
    <div id="map"></div>
    <button id="sidebar-toggle" class="map-overlay-btn">◀</button>

    <!-- Map Picker Guide (Shown when pinning location) -->
    <div id="map-picker-guide">
        <img id="guide-thumb" src="" alt="Thumbnail">
        <div class="guide-content">
            <div class="guide-text">Select location for this photo</div>
            <div class="guide-sub">Click on the map to place the marker</div>
        </div>
    </div>
</div>

<!-- Notification Toasts -->
<div id="toast-container" class="toast-container"></div>

<!-- Street View Overlay -->
<div id="street-view-overlay" class="street-view-overlay">
    <button id="btn-close-street-view" class="close-overlay-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        <span>Close Street View</span>
    </button>
    <iframe id="street-view-frame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <!-- Supabase SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- 인증 모듈을 main.js 이전에 로드해야 함 -->
    <script src="auth.js"></script>
    <script src="main.js"></script>
</body>
</html>
