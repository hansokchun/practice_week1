<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 일본 여행 앨범</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <!-- 섹션 1: 포스트 정보 -->
        <div class="sidebar-section" id="section-view">
            <button id="collapse-btn" title="사이드바 축소">&times;</button>
            <h2>포스트 상세</h2>
            <div id="main-photo-container">
                <img id="current-photo" src="" alt="선택된 사진">
                <button id="main-like-btn" title="좋아요">♡</button>
            </div>
            <p id="photo-description"></p>
            <a id="download-btn" class="button" href="#" download>이미지 저장</a>
            <button id="share-photo-btn" class="button" style="display: none;">친구에게 공유</button>
        </div>

        <!-- 섹션 2: 새 추억 기록 -->
        <div class="sidebar-section" id="section-register">
            <h2>새 포스팅</h2>
            <label for="photo-upload" class="button primary">사진 업로드</label>
            <input type="file" id="photo-upload" multiple accept="image/jpeg, image/png">
            <button id="clear-photos" class="button danger">내 데이터 초기화</button>
        </div>

        <!-- 섹션 3: 피드 탐색 -->
        <div class="sidebar-section" id="section-manage">
            <h2>피드 둘러보기</h2>
            <button id="toggle-view-mode" class="button">전체 피드 보기</button>
            <button id="view-liked-photos" class="button">관심 포스트</button>
            <hr>
            <div id="date-filters">
                <button class="filter-btn active" data-date="all">전체</button>
            </div>
            <button id="toggle-route" class="button">트래블 로드</button>
        </div>

        <!-- 공유된 사진 리스트 (관리 섹션 내에서 상세 보기 시 사용) -->
        <div id="shared-photos-container" style="display: none;">
            <button id="back-to-main-btn" class="button">탐색으로 돌아가기</button>
            <h2>공유된 추억들</h2>
            <div id="shared-photos-list"></div>
        </div>
    </div>
    <button id="toggle-sidebar-btn" title="사이드바 열기/닫기">◀</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="main.js"></script>
</body>
</html>
