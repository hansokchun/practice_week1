<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram | Storytelling</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="map"></div>
        <button id="toggle-sidebar-btn" title="메뉴 열기/닫기">◀</button>
        
        <div id="sidebar">
            <!-- 메인 탐색 뷰 (기본 상태) -->
            <div id="explore-view" class="view-panel active">
                <div class="sidebar-header">
                    <h1 class="brand-logo">Travelgram</h1>
                    <label for="photo-upload" class="upload-btn-elegant" title="새 포스트 작성">Post a Story</label>
                    <input type="file" id="photo-upload" multiple accept="image/jpeg, image/png" style="display:none;">
                </div>

                <div class="tabs-elegant">
                    <button id="toggle-view-mode" class="tab-btn-elegant active">My Stories</button>
                    <button id="toggle-shared-mode" class="tab-btn-elegant">Community</button>
                </div>

                <div class="filter-section">
                    <div class="quick-filters scroll-x">
                        <button id="view-liked-photos" class="filter-chip-elegant">Liked</button>
                        <button id="toggle-route" class="filter-chip-elegant">Path</button>
                    </div>
                    <div id="date-filters" class="quick-filters scroll-x">
                        <button class="filter-chip-elegant active" data-date="all">All Dates</button>
                    </div>
                </div>

                <div class="view-toggle-elegant">
                    <button id="btn-map-view" class="view-mode-btn-elegant active">Map</button>
                    <button id="btn-grid-view" class="view-mode-btn-elegant">Grid</button>
                </div>

                <div id="gallery-grid" class="image-grid-elegant" style="display: none;">
                    <!-- 갤러리 이미지가 동적으로 들어갑니다 -->
                </div>

                <div class="sidebar-footer">
                     <button id="clear-photos" class="text-btn-elegant">Clear My Data</button>
                </div>
            </div>

            <!-- 포스트 상세 뷰 (확대 상태) -->
            <div id="post-view" class="view-panel" style="display: none;">
                <div class="post-header-elegant">
                    <button id="back-to-explore" class="back-btn">Back to Explore</button>
                    <button id="collapse-btn" class="fullscreen-btn">Full Map</button>
                </div>
                
                <div class="post-editorial-content">
                    <div id="main-photo-container">
                        <img id="current-photo" src="" alt="사진">
                        <div class="heart-animation" id="heart-anim">❤️</div>
                    </div>

                    <div class="post-body-elegant">
                        <div class="post-meta-elegant">
                            <span id="post-date" class="date-serif"></span>
                            <div class="post-actions-elegant">
                                <button id="main-like-btn" class="like-btn-elegant">🤍</button>
                                <a id="download-btn" class="save-btn-elegant" href="#" download>Save Image</a>
                            </div>
                        </div>
                        
                        <h2 id="photo-description" class="description-serif"></h2>
                        <div class="likes-info">
                            <span id="like-count-text">0</span> likes from the community
                        </div>

                        <div class="divider-elegant"></div>

                        <div class="comments-section-elegant">
                            <h3>Reflections</h3>
                            <ul id="comments-list"></ul>
                        </div>
                    </div>
                </div>
                
                <form id="comment-form-elegant">
                    <input type="text" id="comment-input" placeholder="Share your thoughts..." required autocomplete="off">
                    <button type="submit">Post</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="main.js"></script>
</body>
</html>
