<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram | Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="icon" href="images/logo.png?v=2" type="image/png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="login-map" class="login-bg"></div>
    <div class="login-overlay"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <h1 class="logo">Travelgram</h1>
                <p class="tagline">Archive your moments, Map your journey.</p>
            </div>

            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" type="button">로그인</button>
                <button id="tab-signup" class="auth-tab" type="button">회원가입</button>
            </div>

            <div id="auth-message" class="auth-message"></div>

            <form id="auth-form" class="auth-form" autocomplete="on">
                <div class="form-group">
                    <label for="email-input">이메일</label>
                    <input type="email" id="email-input" placeholder="email@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password-input">비밀번호</label>
                    <input type="password" id="password-input" placeholder="6자 이상 입력" required minlength="6" autocomplete="current-password">
                </div>
                <button id="btn-submit" class="btn-submit" type="submit">로그인</button>
            </form>

            <div class="divider">또는</div>

            <div class="social-buttons">
                <button id="btn-google" class="btn-social btn-google" type="button">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google로 계속하기
                </button>
            </div>
        </div>
    </div>

    <!-- Supabase SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const existingUser = await getCurrentUser();
            if (existingUser) {
                window.location.href = '/index.html';
                return;
            }

            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const authForm = document.getElementById('auth-form');
            const emailInput = document.getElementById('email-input');
            const passwordInput = document.getElementById('password-input');
            const btnSubmit = document.getElementById('btn-submit');
            const btnGoogle = document.getElementById('btn-google');
            const messageEl = document.getElementById('auth-message');

            let isLoginMode = true;

            function showMessage(text, type = 'error') {
                messageEl.textContent = text;
                messageEl.className = `auth-message visible ${type}`;
                setTimeout(() => messageEl.classList.remove('visible'), 5000);
            }

            function setLoading(loading) {
                btnSubmit.disabled = loading;
                btnGoogle.disabled = loading;
                if (loading) {
                    btnSubmit.innerHTML = `<span class="spinner"></span>처리 중...`;
                } else {
                    btnSubmit.textContent = isLoginMode ? '로그인' : '회원가입';
                }
            }

            tabLogin.onclick = () => {
                isLoginMode = true;
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                btnSubmit.textContent = '로그인';
                passwordInput.autocomplete = 'current-password';
                messageEl.classList.remove('visible');
            };

            tabSignup.onclick = () => {
                isLoginMode = false;
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                btnSubmit.textContent = '회원가입';
                passwordInput.autocomplete = 'new-password';
                messageEl.classList.remove('visible');
            };

            authForm.onsubmit = async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) return showMessage('이메일과 비밀번호를 모두 입력해주세요.');
                if (password.length < 6) return showMessage('비밀번호는 6자 이상이어야 합니다.');

                setLoading(true);

                if (isLoginMode) {
                    const { user, error } = await signInWithEmail(email, password);
                    if (error) {
                        showMessage(error.message.includes('Invalid login') ? '이메일 또는 비밀번호가 올바르지 않습니다.' : error.message);
                    } else {
                        showMessage('로그인 성공! 이동 중...', 'success');
                        setTimeout(() => { window.location.href = '/index.html'; }, 800);
                    }
                } else {
                    const { user, error } = await signUpWithEmail(email, password);
                    if (error) {
                        showMessage(error.message.includes('already registered') ? '이미 가입된 이메일입니다.' : error.message);
                    } else {
                        showMessage('회원가입 완료! 이메일 인증 후 로그인해주세요.', 'success');
                        tabLogin.click();
                    }
                }
                setLoading(false);
            };

            btnGoogle.onclick = async () => {
                setLoading(true);
                const { error } = await signInWithGoogle();
                if (error) {
                    showMessage('구글 로그인에 실패했습니다. 다시 시도해주세요.');
                    setLoading(false);
                }
            };
        });
    </script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // 백그라운드 지도 초기화 (메인 화면과 동일한 구글 맵 유지)
        const map = L.map('login-map', {
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            touchZoom: false,
            doubleClickZoom: false,
            scrollWheelZoom: false,
            boxZoom: false,
            keyboard: false
        }).setView([37.5665, 126.9780], 13); // 서울 중심 좌표

        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=ko', {
            maxZoom: 19
        }).addTo(map);

        // 약간의 부드러운 패닝 애니메이션 효과 (옵션)
        setInterval(() => {
            map.panBy([1, 0], { animate: true, duration: 1 });
        }, 1000);
    </script>
</body>
</html>
